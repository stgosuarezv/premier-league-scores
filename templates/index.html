<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scores</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root {
      --bg:                #0f1117;
      --bg-header:         #17191f;
      --bg-featured:       #1a1d2b;
      --bg-featured-hover: #1c2032;
      --bg-row-hover:      #13151c;
      --border:            #22252e;
      --border-row:        #1a1d25;
      --border-featured:   #2d3148;
      --text-primary:      #e0e0e0;
      --text-strong:       #ffffff;
      --text-secondary:    #6b7280;
      --text-muted:        #4b5563;
      --score-col:         #ffffff;
      --tab-inactive:      #6b7280;
      --tab-hover:         #c4b8d8;
      --tab-active:        #ffffff;
      --shadow-featured:   0 4px 24px rgba(0,0,0,0.35);
      --header-h:          80px;
    }

    html.light {
      --bg:                #f0f2f5;
      --bg-header:         #ffffff;
      --bg-featured:       #ffffff;
      --bg-featured-hover: #f9fafb;
      --bg-row-hover:      #f5f7fa;
      --border:            #e0e4ea;
      --border-row:        #edf0f4;
      --border-featured:   #d1d5db;
      --text-primary:      #1f2937;
      --text-strong:       #111827;
      --text-secondary:    #6b7280;
      --text-muted:        #9ca3af;
      --score-col:         #111827;
      --tab-inactive:      #6b7280;
      --tab-hover:         #374151;
      --tab-active:        #111827;
      --shadow-featured:   0 2px 16px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.25rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
    }

    .app-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-strong);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    #lang-select, #theme-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 0.28rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }
    #lang-select:hover, #lang-select:focus,
    #theme-btn:hover { border-color: #7c3aed; color: var(--text-primary); }

    /* ── League tabs ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--tab-inactive);
      text-decoration: none;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .tab:hover { color: var(--tab-hover); }
    .tab.active { color: var(--tab-active); border-bottom-color: #7c3aed; }

    /* ── Content ── */
    main { max-width: 680px; margin: 0 auto; }

    /* ── Date header ── */
    .date-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.25rem 0.4rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: var(--bg);
      position: sticky;
      top: var(--header-h);
      z-index: 10;
    }
    .date-header .gw { color: var(--text-muted); }

    /* ── Standard match row ── */
    .match-row {
      display: flex;
      align-items: center;
      padding: 0.7rem 1.25rem;
      border-top: 1px solid var(--border-row);
      transition: background 0.1s;
      cursor: default;
    }
    .match-row:hover { background: var(--bg-row-hover); }

    /* Status badge */
    .match-status {
      width: 3.2rem;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }
    .match-status.ft   { color: var(--text-secondary); }
    .match-status.live { color: #ef4444; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .match-status.ht   { color: #f97316; }
    .match-status.ppd  { color: #f59e0b; }
    .match-status.time { color: var(--text-primary); }

    .tz-label { font-size: 0.58rem; color: var(--text-muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* Teams + score */
    .match-body { flex: 1; display: flex; align-items: center; gap: 0.4rem; min-width: 0; }

    .team-block { flex: 1; display: flex; align-items: center; gap: 0.45rem; min-width: 0; }
    .team-block.home { justify-content: flex-end; }
    .team-block img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }

    .team-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-block.home .team-name { text-align: right; }

    .score-block {
      display: flex; align-items: center; gap: 0.15rem;
      flex-shrink: 0; min-width: 3.6rem; justify-content: center;
    }
    .score-num { font-size: 0.95rem; font-weight: 700; color: var(--score-col); min-width: 1rem; text-align: center; }
    .score-sep { color: var(--text-muted); font-size: 0.85rem; }
    .score-vs  { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; }

    /* ── Featured hero card ── */
    .match-row.featured {
      flex-direction: column;
      align-items: stretch;
      padding: 1.75rem 1.5rem 1.5rem;
      background: var(--bg-featured);
      border-top: none;
      border-bottom: 1px solid var(--border-featured);
      gap: 1.25rem;
      box-shadow: var(--shadow-featured);
    }
    .match-row.featured:hover { background: var(--bg-featured-hover); }

    .featured-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c3aed;
      text-align: center;
    }

    .featured-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .featured-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .featured-team img { width: 72px; height: 72px; object-fit: contain; }
    .featured-team .fname {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-strong);
      text-align: center;
      line-height: 1.3;
    }

    .featured-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
    }
    .featured-time {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: 0.04em;
    }
    .featured-sub { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Loading spinner ── */
    .loading { display: flex; justify-content: center; padding: 3.5rem; }
    .loading::after {
      content: '';
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message states ── */
    .message {
      text-align: center;
      padding: 3.5rem 1.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .message strong { display: block; color: var(--text-primary); font-size: 1rem; margin-bottom: 0.4rem; }
  </style>
</head>
<body>

<header class="app-header" id="app-header">
  <div class="header-top">
    <span class="app-title" data-i18n="title">Scores</span>
    <div class="header-controls">
      <select id="lang-select">
        <option value="en">EN</option>
        <option value="es">ES</option>
        <option value="de">DE</option>
        <option value="ko">한국어</option>
      </select>
      <button id="theme-btn" aria-label="Toggle theme">☀️</button>
    </div>
  </div>
  <nav class="tabs">
    {% for lg in leagues %}
    <a href="/?league={{ lg.code }}"
       class="tab {% if active_league == lg.code %}active{% endif %}"
       data-league="{{ lg.code }}">
      {{ lg.flag }} {{ lg.name }}
    </a>
    {% endfor %}
  </nav>
</header>

<main>
  <div id="matches-container">
    {% include '_matches.html' %}
  </div>
</main>

<script>
  /* ── Translations ── */
  const T = {
    en: {
      title: 'Scores', nextMatch: 'Next Match', matchday: 'Matchday',
      ft: 'FT', ht: 'HT', live: 'LIVE', ppd: 'PPD', can: 'CAN', vs: 'vs',
      notAvailable: 'Not available',
      notAvailableMsg: 'This league is not included in the current API plan.',
      error: 'Error', noMatches: 'No matches found for this season.',
      networkError: 'Could not load matches. Check your connection.',
    },
    es: {
      title: 'Resultados', nextMatch: 'Próximo Partido', matchday: 'Jornada',
      ft: 'FIN', ht: 'ET', live: 'EN VIVO', ppd: 'APLAZ', can: 'CANC', vs: 'vs',
      notAvailable: 'No disponible',
      notAvailableMsg: 'Esta liga no está disponible en el plan actual de la API.',
      error: 'Error', noMatches: 'No se encontraron partidos esta temporada.',
      networkError: 'No se pudieron cargar los partidos. Comprueba tu conexión.',
    },
    de: {
      title: 'Ergebnisse', nextMatch: 'Nächstes Spiel', matchday: 'Spieltag',
      ft: 'Ende', ht: 'HZ', live: 'LIVE', ppd: 'VERL', can: 'ABG', vs: 'vs',
      notAvailable: 'Nicht verfügbar',
      notAvailableMsg: 'Diese Liga ist im aktuellen API-Plan nicht enthalten.',
      error: 'Fehler', noMatches: 'Keine Spiele in dieser Saison gefunden.',
      networkError: 'Spiele konnten nicht geladen werden. Verbindung prüfen.',
    },
    ko: {
      title: '스코어', nextMatch: '다음 경기', matchday: '라운드',
      ft: '종료', ht: '하프타임', live: '라이브', ppd: '연기', can: '취소', vs: 'vs',
      notAvailable: '이용 불가',
      notAvailableMsg: '현재 API 플랜에 포함되지 않는 리그입니다.',
      error: '오류', noMatches: '이번 시즌 경기를 찾을 수 없습니다.',
      networkError: '경기를 불러올 수 없습니다. 연결을 확인해주세요.',
    },
  };

  function currentLang() {
    return document.getElementById('lang-select').value;
  }

  function applyTranslations(lang) {
    const t = T[lang] || T.en;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    localStorage.setItem('lang', lang);
  }

  /* ── Theme ── */
  function setTheme(theme) {
    document.documentElement.classList.toggle('light', theme === 'light');
    document.getElementById('theme-btn').textContent = theme === 'light' ? '🌙' : '☀️';
    localStorage.setItem('theme', theme);
  }

  /* ── Times ── */
  function applyLocalTimes() {
    const tzLabel = Intl.DateTimeFormat(undefined, { timeZoneName: 'short' })
      .formatToParts(new Date()).find(p => p.type === 'timeZoneName')?.value || 'local';

    document.querySelectorAll('[data-utc]').forEach(el => {
      const d = new Date(el.dataset.utc);
      if (!isNaN(d)) {
        el.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      }
    });
    document.querySelectorAll('.tz-label').forEach(el => { el.textContent = tzLabel; });
  }

  /* ── Header height CSS var ── */
  function syncHeaderHeight() {
    document.documentElement.style.setProperty(
      '--header-h', document.getElementById('app-header').offsetHeight + 'px'
    );
  }

  /* ── Scroll to next match ── */
  function scrollToNextMatch() {
    const target = document.getElementById('scroll-target');
    if (!target) return;
    const headerH = document.getElementById('app-header').offsetHeight;
    const y = target.getBoundingClientRect().top + window.scrollY - headerH;
    window.scrollTo({ top: Math.max(0, y), behavior: 'instant' });
  }

  /* ── Tab switching (no full page reload) ── */
  async function loadLeague(league) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.league === league);
    });
    document.getElementById('matches-container').innerHTML = '<div class="loading"></div>';
    window.scrollTo({ top: 0, behavior: 'instant' });

    try {
      const html = await fetch('/matches-partial?league=' + league).then(r => r.text());
      document.getElementById('matches-container').innerHTML = html;
    } catch {
      const t = T[currentLang()] || T.en;
      document.getElementById('matches-container').innerHTML =
        '<div class="message"><strong>' + t.error + '</strong>' + t.networkError + '</div>';
    }

    history.pushState({ league }, '', '/?league=' + league);
    syncHeaderHeight();
    applyLocalTimes();
    applyTranslations(currentLang());
    scrollToNextMatch();
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', e => { e.preventDefault(); loadLeague(tab.dataset.league); });
  });

  document.getElementById('theme-btn').addEventListener('click', () => {
    const isLight = document.documentElement.classList.contains('light');
    setTheme(isLight ? 'dark' : 'light');
  });

  document.getElementById('lang-select').addEventListener('change', e => {
    applyTranslations(e.target.value);
  });

  window.addEventListener('popstate', () => location.reload());
  window.addEventListener('resize', syncHeaderHeight);

  /* ── Init ── */
  document.addEventListener('DOMContentLoaded', () => {
    // Restore saved preferences
    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);

    const savedLang = localStorage.getItem('lang') || 'en';
    document.getElementById('lang-select').value = savedLang;
    applyTranslations(savedLang);

    syncHeaderHeight();
    applyLocalTimes();
    scrollToNextMatch();
  });
</script>

</body>
</html>
